<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Zorvynfi</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #08060d;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px; /* Slightly more gap for the image */
      }
      .logo-float-wrapper {
        animation: float-logo 3s ease-in-out infinite 2.5s;
      }
      .logo-wrapper {
        position: relative;
        width: 60px;
        height: 60px;
        transform: translateX(70px) scale(1.6); /* Start large, centered, vertically true */
        animation: logo-shrink-move 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.6s forwards;
      }
      @keyframes logo-shrink-move {
        100% { transform: translate(0, 5px) scale(1); } /* Drop 5px downwards to align perfectly with text */
      }
      .splash-logo-outline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: url(#png-outline) drop-shadow(0 0 10px rgba(209, 213, 219, 0.8));
        opacity: 0;
        animation: reveal-outline-opacity 1s ease-out forwards, fade-out-outline 0.6s ease-in 1.5s forwards;
      }
      @keyframes reveal-outline-opacity {
        100% { opacity: 1; }
      }
      @keyframes fade-out-outline {
        100% { opacity: 0; }
      }
      .splash-logo-filled {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        filter: drop-shadow(0 0 15px rgba(209, 213, 219, 0.6));
        animation: fill-in-image 0.8s ease-in 1.2s forwards;
      }
      @keyframes fill-in-image {
        100% { opacity: 1; }
      }
      @keyframes float-logo {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .splash-text-part {
        font-family: 'Outfit', sans-serif;
        font-size: 3.5rem;
        font-weight: 600;
        color: #f3f4f6;
        letter-spacing: 0.05em;
        text-shadow: 0 0 15px rgba(209, 213, 219, 0.5);
        opacity: 0;
        transform: translateX(-40px);
        animation: fade-in-slide-text 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.8s forwards;
        position: relative;
        top: 2px;
      }
      @keyframes fade-in-slide-text {
        100% { opacity: 1; transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="png-outline">
          <feMorphology in="SourceAlpha" operator="dilate" radius="2.5" result="dilated" />
          <feComposite in="dilated" in2="SourceAlpha" operator="out" result="outline" />
          <feFlood flood-color="#d1d5db" result="color" />
          <feComposite in="color" in2="outline" operator="in" />
        </filter>
      </svg>
      <div class="splash-logo-container">
        <div class="logo-float-wrapper">
          <div class="logo-wrapper">
            <img src="/splash.png" alt="Zorvynfi Outline" class="splash-logo-outline" />
            <img src="/splash.png" alt="Zorvynfi Logo" class="splash-logo-filled" />
          </div>
        </div>
        <span class="splash-text-part">orvynfi</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            // Remove from DOM entirely after perfect unified fade out
            setTimeout(() => {
              splash.remove();
            }, 600);
          }
        }, 3200); // Waits to ensure everything effortlessly settles before uniform fadeout
      });
    </script>
  </body>
</html>
